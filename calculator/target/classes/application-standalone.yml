calculator:
  rate: 20
  insurance:
    costInPercent: 0.10
    discount: 5
  salary:
    discount: 1
springdoc:
  swagger-ui:
    url: /openapi.json
server:
  port: 8081

management:
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include:
          - health
          - prometheus